# GoReleaser configuration for warded CLI
# Documentation: https://goreleaser.com

version: 2

project_name: warded

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: warded
    main: ./cmd/warded
    binary: warded
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.Version={{.Version}}
    flags:
      - -trimpath

archives:
  - id: warded
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    files:
      - LICENSE
      - README.md
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  # Auto-generate changelog from git commits
  # Format: conventional commits
  use: github
  format: "{{ .Message }}"
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^refactor:"
      - "^style:"
      - "Merge pull request"
      - "Merge branch"
  sort: asc
  groups:
    - title: Features
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: "Bug Fixes"
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 1
    - title: Others
      order: 999

release:
  # Create draft release for manual review
  draft: true
  # Replace existing draft release with same name
  replace_existing_draft: true
  # Use manually written release notes
  # User should write release notes on GitHub before publishing
  mode: keep-existing
  # GitHub release name template
  name_template: "{{ .ProjectName }} {{ .Version }}"
  # Header template for the release
  header: |
    ## Release {{ .Version }}

    **Full Changelog**: https://github.com/herewei/warded/compare/{{ .PreviousTag }}...{{ .Tag }}

  # Footer with installation instructions
  footer: |
    ## Installation

    Use the official installer entrypoint:

    ```bash
    curl -fsSL https://warded.me/install.sh | sh
    ```

    Manual archive names in this release follow:

    ```bash
    warded_darwin_amd64.tar.gz
    warded_darwin_arm64.tar.gz
    warded_linux_amd64.tar.gz
    warded_linux_arm64.tar.gz
    ```

  # GitHub repository to release to
  github:
    owner: herewei
    name: warded

